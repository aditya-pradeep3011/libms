apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: libms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: adityapradeep3011/libms-inventory-service:latest
          ports:
            - containerPort: 9002
          env:
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI
              valueFrom:
                configMapKeyRef:
                  key: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI
                  name: inventory-service-config
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  key: SPRING_DATASOURCE_URL
                  name: inventory-service-config
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  key: SPRING_DATASOURCE_USERNAME
                  name: inventory-service-config
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: spring_datasource_password
                  name: inventory-service-secrets
---
apiVersion: v1
data:
  spring_datasource_password: cGFzc3dvcmQ=
kind: Secret
metadata:
  name: inventory-service-secrets
  namespace: libms
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: libms
spec:
  selector:
    app: inventory-service
  ports:
    - protocol: TCP
      port: 9002
      targetPort: 9002
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-service-config
  namespace: libms
data:
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql.libms.svc.cluster.local:3306/libms_inventory"
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI: "http://keycloak.libms.svc.cluster.local:8080/realms/libms-realm"
  SPRING_DATASOURCE_USERNAME: "user"