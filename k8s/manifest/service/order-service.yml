apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: libms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: adityapradeep3011/libms-order-service:latest
          env:
            - name: SPRING_KAFKA_BOOTSTRAP-SERVERS
              valueFrom:
                configMapKeyRef:
                  key: SPRING_KAFKA_BOOTSTRAP-SERVERS
                  name: order-service-config
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  key: SPRING_DATASOURCE_URL
                  name: order-service-config
            - name: INVENTORY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  key: INVENTORY_SERVICE_URL
                  name: order-service-config
            - name: SPRING_KAFKA_PRODUCER_PROPERTIES_SCHEMA_REGISTRY_URL
              valueFrom:
                configMapKeyRef:
                  key: SPRING_KAFKA_PRODUCER_PROPERTIES_SCHEMA_REGISTRY_URL
                  name: order-service-config
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI
              valueFrom:
                configMapKeyRef:
                  key: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI
                  name: order-service-config
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: libms
spec:
  selector:
    app: order-service
  ports:
    - protocol: TCP
      port: 9003
      targetPort: 9003
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: libms
data:
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql.libms.svc.cluster.local:3306/libms_order"
  SPRING_KAFKA_PRODUCER_PROPERTIES_SCHEMA_REGISTRY_URL: "http://schema-registry.libms.svc.cluster.local:8081"
  INVENTORY_SERVICE_URL: "http://inventory-service.libms.svc.cluster.local:9002"
  SPRING_KAFKA_BOOTSTRAP-SERVERS: "broker.libms.svc.cluster.local:29092"
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI: "http://keycloak.libms.svc.cluster.local:8080/realms/libms-realm"