apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: libms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: adityapradeep3011/libms-notification-service:latest
          env:
            - name: SPRING_KAFKA_BOOTSTRAP-SERVERS
              valueFrom:
                configMapKeyRef:
                  key: SPRING_KAFKA_BOOTSTRAP-SERVERS
                  name: notification-service-config
            - name: SPRING_KAFKA_CONSUMER_PROPERTIES_SCHEMA_REGISTRY_URL
              valueFrom:
                configMapKeyRef:
                  key: SPRING_KAFKA_CONSUMER_PROPERTIES_SCHEMA_REGISTRY_URL
                  name: notification-service-config
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: libms
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 9004
      targetPort: 9004
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: libms
data:
  SPRING_KAFKA_CONSUMER_PROPERTIES_SCHEMA_REGISTRY_URL: "http://schema-registry.libms.svc.cluster.local:8081"
  SPRING_KAFKA_BOOTSTRAP-SERVERS: "broker.libms.svc.cluster.local:29092"