apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: libms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: adityapradeep3011/libms-api-gateway:latest
          ports:
            - containerPort: 9000
          env:
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI
              valueFrom:
                configMapKeyRef:
                  key: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI
                  name: api-gateway-config
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  key: PRODUCT_SERVICE_URL
                  name: service-url-config
            - name: ORDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  key: ORDER_SERVICE_URL
                  name: service-url-config
            - name: INVENTORY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  key: INVENTORY_SERVICE_URL
                  name: service-url-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: libms
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000
      nodePort: 30000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: libms
data:
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI: "http://keycloak.libms.svc.cluster.local:8080/realms/libms-realm"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-url-config
  namespace: libms
data:
  PRODUCT_SERVICE_URL: "http://product-service.libms.svc.cluster.local:9001"
  ORDER_SERVICE_URL: "http://order-service.libms.svc.cluster.local:9003"
  INVENTORY_SERVICE_URL: "http://inventory-service.libms.svc.cluster.local:9002"