services:
  mysql:
    image: mysql:8.3.0
    container_name: product-service-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: libms-product
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3001:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: